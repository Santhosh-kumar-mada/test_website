<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodingLab · Login</title>
  <!-- Google Font: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ----- RESET & BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      color: #222;
      overflow: hidden;
    }

    /* ----- FULLSCREEN HERO (background) ----- */
    .hero {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('images/bg.jpg') center / cover no-repeat;
      z-index: 0;
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(20, 15, 40, 0.70);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 1;
    }

    /* ----- NAVBAR ----- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      background: rgba(15, 23, 42, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 30px rgba(0,0,0,0.15);
      flex-wrap: wrap;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 600;
      font-size: 1.3rem;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .nav-brand span {
      background: linear-gradient(135deg, #A855F7, #7B2FF7);
      padding: 0.15rem 0.7rem;
      border-radius: 40px;
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      font-weight: 400;
      font-size: 0.95rem;
    }
    .nav-links li a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      transition: color 0.25s, border-bottom 0.25s;
      padding-bottom: 0.25rem;
      border-bottom: 2px solid transparent;
    }
    .nav-links li a:hover {
      color: #fff;
      border-bottom-color: #A855F7;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .btn-login-nav {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #fff;
      padding: 0.4rem 1.6rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.02);
      pointer-events: none; /* login page, no action needed */
    }

    /* ----- CENTER LOGIN CARD (always visible) ----- */
    .card-wrapper {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      pointer-events: none;
    }
    .login-card {
      background: #FFFFFF;
      width: 100%;
      max-width: 380px;
      padding: 2.2rem 2rem 2rem;
      border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      pointer-events: auto;
      position: relative;
      margin: 0 auto;
    }
    .login-card h2 {
      font-size: 1.9rem;
      font-weight: 600;
      margin-bottom: 1.6rem;
      color: #222;
      letter-spacing: -0.3px;
    }

    /* input groups */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-group i {
      position: absolute;
      left: 0;
      top: 0.5rem;
      color: #8A2BE2;
      font-size: 1.1rem;
      width: 1.6rem;
      text-align: center;
      opacity: 0.7;
      font-style: normal;
    }
    .input-group input {
      width: 100%;
      padding: 0.6rem 0 0.5rem 2rem;
      border: none;
      border-bottom: 1.5px solid #d0d0d0;
      background: transparent;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s;
      outline: none;
      color: #222;
    }
    .input-group input:focus {
      border-bottom-color: #8A2BE2;
    }
    .input-group input::placeholder {
      color: #aaa;
      font-weight: 300;
      font-size: 0.85rem;
    }

    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.3rem 0 1.8rem;
      font-size: 0.85rem;
    }
    .row-options label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #444;
      cursor: pointer;
    }
    .row-options label input[type="checkbox"] {
      accent-color: #8A2BE2;
      width: 1rem;
      height: 1rem;
    }
    .forgot-link {
      color: #7B2FF7;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: #A855F7;
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #8A2BE2, #7B2FF7);
      border: none;
      border-radius: 60px;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(123,47,247,0.30);
      letter-spacing: 0.3px;
      margin-top: 0.2rem;
    }
    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(123,47,247,0.50);
      background: linear-gradient(135deg, #9A4BFF, #7B2FF7);
    }

    .signup-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #555;
    }
    .signup-text a {
      color: #7B2FF7;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
    }
    .signup-text a:hover {
      color: #A855F7;
      text-decoration: underline;
    }

    /* register form hidden by default */
    #registerForm {
      display: none;
    }
    #registerForm .input-group {
      margin-bottom: 1.2rem;
    }

    /* error message */
    .auth-error {
      color: #e74c3c;
      font-size: 0.8rem;
      margin: -0.5rem 0 0.8rem;
      text-align: center;
      min-height: 1.2rem;
    }

    /* responsive */
    @media (max-width: 768px) {
      .navbar { padding: 0.8rem 1.2rem; flex-wrap: wrap; gap: 0.4rem; }
      .nav-links { gap: 1.2rem; font-size: 0.85rem; order: 3; width: 100%; justify-content: center; margin-top: 0.2rem; }
      .nav-actions { margin-left: auto; }
      .nav-brand { font-size: 1.1rem; }
      .login-card { padding: 2rem 1.5rem; max-width: 340px; }
    }
    @media (max-width: 480px) {
      .navbar { flex-direction: column; align-items: stretch; gap: 0.2rem; padding: 0.6rem 0.8rem; }
      .nav-brand { justify-content: center; }
      .nav-links { justify-content: center; gap: 0.8rem; font-size: 0.8rem; flex-wrap: wrap; }
      .nav-actions { justify-content: center; margin-left: 0; margin-top: 0.2rem; }
      .login-card { padding: 1.8rem 1.2rem; max-width: 300px; }
      .row-options { flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    }

    .icon-email::before { content: "✉"; }
    .icon-lock::before { content: "🔒"; }
    .input-group i { font-style: normal; }
  </style>
</head>
<body>
  <!-- HERO -->
  <div class="hero"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand"><span>CodingLab</span></div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Product</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-login-nav">Login</button>
    </div>
  </nav>

  <!-- LOGIN CARD -->
  <div class="card-wrapper">
    <div class="login-card" id="loginCard">
      <!-- Login Form -->
      <div id="loginForm">
        <h2>Login</h2>
        <div class="input-group">
          <i class="icon-email"></i>
          <input type="email" id="loginEmail" placeholder="Email address" />
        </div>
        <div class="input-group">
          <i class="icon-lock"></i>
          <input type="password" id="loginPassword" placeholder="Password" />
        </div>
        <div class="row-options">
          <label><input type="checkbox" id="rememberMe" /> Remember Me</label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <div id="loginError" class="auth-error"></div>
        <button class="btn-login" id="loginBtn">Login Now</button>
        <div class="signup-text">
          Not a member? <a id="switchToRegister">Signup Now</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm">
        <h2>Sign Up</h2>
        <div class="input-group">
          <i class="icon-email"></i>
          <input type="email" id="registerEmail" placeholder="Email address" />
        </div>
        <div class="input-group">
          <i class="icon-lock"></i>
          <input type="password" id="registerPassword" placeholder="Password" />
        </div>
        <div id="registerError" class="auth-error"></div>
        <button class="btn-login" id="registerBtn">Create Account</button>
        <div class="signup-text">
          Already have an account? <a id="switchToLogin">Login</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    // -------------------- FIREBASE CONFIG (using Compat SDK) --------------------
    const firebaseConfig = {
      apiKey: "AIzaSyCdmAuyk6OSZPGwbAm3hlxXA37cvx_1_So",
      authDomain: "codinglab-chat.firebaseapp.com",
      projectId: "codinglab-chat",
      storageBucket: "codinglab-chat.firebasestorage.app",
      messagingSenderId: "1044316367365",
      appId: "1:1044316367365:web:f584b8a1189f74f1b60a6c",
      measurementId: "G-QXFN18RGHT"
    };

    // Initialize Firebase using Compat SDK
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // -------------------- DOM REFS --------------------
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const switchToRegister = document.getElementById('switchToRegister');
    const switchToLogin = document.getElementById('switchToLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const registerEmail = document.getElementById('registerEmail');
    const registerPassword = document.getElementById('registerPassword');
    const loginError = document.getElementById('loginError');
    const registerError = document.getElementById('registerError');
    const rememberMe = document.getElementById('rememberMe');

    // -------------------- UI HELPERS --------------------
    function showLoginForm() {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      loginError.textContent = '';
      registerError.textContent = '';
    }
    function showRegisterForm() {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      loginError.textContent = '';
      registerError.textContent = '';
    }

    switchToRegister.addEventListener('click', (e) => { e.preventDefault(); showRegisterForm(); });
    switchToLogin.addEventListener('click', (e) => { e.preventDefault(); showLoginForm(); });

    // -------------------- AUTH STATE --------------------
    auth.onAuthStateChanged(user => {
      if (user) {
        // Already logged in → redirect to chat
        window.location.href = 'chat.html';
      }
    });

    // -------------------- LOGIN --------------------
    loginBtn.addEventListener('click', async () => {
      const email = loginEmail.value.trim();
      const pass = loginPassword.value.trim();
      if (!email || !pass) {
        loginError.textContent = 'Please fill in all fields.';
        return;
      }
      loginError.textContent = '';
      
      // Set persistence based on Remember Me checkbox
      const persistence = rememberMe.checked 
        ? firebase.auth.Auth.Persistence.LOCAL 
        : firebase.auth.Auth.Persistence.SESSION;
      
      try {
        await auth.setPersistence(persistence);
        await auth.signInWithEmailAndPassword(email, pass);
        // Redirect will happen via onAuthStateChanged
      } catch (err) {
        loginError.textContent = err.message;
      }
    });

    // -------------------- REGISTER --------------------
    registerBtn.addEventListener('click', async () => {
      const email = registerEmail.value.trim();
      const pass = registerPassword.value.trim();
      if (!email || !pass) {
        registerError.textContent = 'Please fill in all fields.';
        return;
      }
      registerError.textContent = '';
      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        // After signup, user is logged in → redirect via onAuthStateChanged
      } catch (err) {
        registerError.textContent = err.message;
      }
    });

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (loginForm.style.display !== 'none') {
          loginBtn.click();
        } else if (registerForm.style.display !== 'none') {
          registerBtn.click();
        }
      }
    });

    console.log('Login page ready with Firebase Compat SDK.');
  </script>
</body>
</html>
